<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecureAuth</title>

<link rel="icon" href="assets/favicon.png" type="image/png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="login-wrapper">

    <div class="login-card">

        <div class="brand">

            <h1>SecureAuth</h1>

            <p>
                Secure phone authentication powered by
                Express.js, JWT and OTP verification.
            </p>

        </div>

        <div class="input-group">

            <label>Mobile Number</label>

            <input
                id="phone"
                type="tel"
                placeholder="+91 9876543210">

        </div>

        <button
            class="primary-btn"
            onclick="sendOTP()">

            Send Verification Code

        </button>

        <div
            id="otpSection"
            class="otp-section">

            <div class="input-group">

                <label>Verification Code</label>

                <input
                    id="otp"
                    type="text"
                    maxlength="6"
                    placeholder="Enter 6-digit OTP">

            </div>

            <button
                class="primary-btn"
                onclick="verifyOTP()">

                Verify & Continue

            </button>

        </div>

        <div class="security">

            <div>✓ JWT Authentication</div>

            <div>✓ OTP Verification</div>

            <div>✓ Express API</div>

            <div>✓ Twilio SMS</div>

        </div>

        <div class="footer">

            Developed by
            <a
                href="https://linkedin.com/in/anandans05"
                target="_blank">

                Anandan S

            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
